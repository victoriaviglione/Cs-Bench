name: Sync Drive & Deploy

on:
  # Run every day at 0:00 ART (Argentina Time = UTC-3 → 03:00 UTC)
  schedule:
    - cron: "0 3 * * *"
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch data from Apps Script
        run: |
          curl -L "${{ secrets.APPS_SCRIPT_URL }}" -o data.json
          python3 -c "
          import sys, json
          d = json.load(open('data.json'))
          print(f\"Synced: {d['total_benchmarks']} benchmarks, {d['total_spotlights']} spotlights\")
          " 2>/dev/null || echo "data.json updated"

      - name: Commit updated data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          # Only commit if there are changes
          git diff --cached --quiet || git commit -m "chore: sync Drive data [$(date -u '+%Y-%m-%d %H:%M UTC')]"

      - name: Push changes
        run: git push
