name: Sync Drive & Deploy

on:
  # Run every day at 0:00 ART (Argentina Time = UTC-3 → 03:00 UTC)
  schedule:
    - cron: "0 3 * * *"
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Drive sync
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python sync_drive.py

      - name: Commit updated data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          # Only commit if there are changes
          git diff --cached --quiet || git commit -m "chore: sync Drive data [$(date -u '+%Y-%m-%d %H:%M UTC')]"

      - name: Push changes
        run: git push
